<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js";
      import { NavBar } from "./component/NavBar/script.js";
      import { Movies } from "./component/Movies/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { MovieFavorite } from "./component/MovieFavorite/script.js";
      import { MoviesHighlighted } from "./component/MovieHighlighted/script.js";
      import { DataProfile } from "./data/dataProfiles.js";
      import { DataFavorite } from "./data/dataFavorite.js";
      import { DataHighlight } from "./data/dataHighlight.js";

      let profiles = await DataProfile.requestProfiles();
      let movies = null;
      let currentProfileId = null;
      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerDropdown = function () {
        let dropdown = document.querySelector(".dropdown");
        if (dropdown) {
          dropdown.classList.toggle("open");
        }
      };

      C.handlerSelectProfile = async function (id) {
                let searchBar = document.querySelector(".navbar__searchbar");
        if (searchBar) {
          searchBar.value = "";
        }
        let content = document.querySelector("#content");
        if (!id) {
          content.innerHTML = `
                <div class="empty-state">
                    <p>Sélectionner pour commencer.</p>
                </div>`;
          return;
        }
        currentProfileId = id;
        content.innerHTML = "";
        let profileSelected = await DataProfile.requestProfiles(id);
        movies = await DataMovie.requestMovies(profileSelected.min_age);
        let favorite = await DataFavorite.requestFavorite(id);
        let hightlight = await DataHighlight.requestHighlight(
          profileSelected.min_age,
        );
        V.renderMoviesFavorite("C.handlerMovieDetail", favorite);
        V.renderMoviesHighlighted("C.handlerMovieDetail", hightlight);
        V.renderMoviesCategory(movies, "C.handlerMovieDetail");
        let dropdown = document.querySelector(".dropdown");
        if (dropdown) {
          dropdown.classList.remove("open");
        }
      };

      C.handlerMovieDetail = async function (id) {
        let idProfile = currentProfileId;
        let selectedMovie = await DataMovie.requestMovieDetails(id, idProfile);

        if (selectedMovie) {
          V.renderMovieDetail(
            selectedMovie,
            `C.handlerAddFavorite(${idProfile}, ${id})`,
          );
          if (selectedMovie.isFavorite == true) {
            let favorite = document.querySelector(".detail__favorite");
            if (favorite) {
              favorite.classList.add("detail__favorite--select");
            }
          }
        }
      };

      C.handlerCloseMovieDetail = function () {
        C.handlerSelectProfile(currentProfileId);
      };

      C.handlerSearch = async function () {
        let profileSelected =
          await DataProfile.requestProfiles(currentProfileId);
        if (!currentProfileId) {
          C.handlerSelectProfile(currentProfileId);
          return;
        }

        let searchValue = document.querySelector(".navbar__searchbar").value;
        let data = await DataMovie.requestSearchMovies(
          profileSelected.min_age,
          searchValue,
        );
        if (searchValue != "") {
          if (data.error) {
            let content = document.querySelector("#content");
            content.innerHTML = `
            <div class="empty-state">
                <p>${data.error}</p>
            </div>`;
          } else {
            V.renderMovies(data, "C.handlerMovieDetail");
          }
        } else {
          C.handlerSelectProfile(currentProfileId);
        }
      };

      C.handlerAddFavorite = async function (profile, movie) {
        let result = await DataFavorite.updatefavorite(profile, movie);
        let favorite = document.querySelector(".detail__favorite");

        if (result == "Ajouté à la liste des favoris") {
          favorite.classList.add("detail__favorite--select");
          alert(result);
        } else if (
          result == "Retiré de la liste des favoris" ||
          result == "Votre liste de favoris est vide"
        ) {
          favorite.classList.remove("detail__favorite--select");
          alert(result);
        } else {
          alert(result);
        }
      };

      C.handlerLogOut = function () {
        currentProfileId = null;
        let searchBar = document.querySelector(".navbar__searchbar");
        if (searchBar) {
          searchBar.value = "";
        }
        let selectMenu = document.querySelector(".navbar select[name='id']");
        if (selectMenu) {
          selectMenu.value = "";
        }
        C.handlerSelectProfile(currentProfileId);
      };

      C.start = function () {
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerCloseMovieDetail()",
          "C.handlerSelectProfile",
          profiles,
          "C.handlerLogOut()",
          "C.handlerDropdown()",
          "C.handlerSearch()",
        );
        C.handlerSelectProfile(currentProfileId);
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderProfiles = function (data, handler) {
        let header = document.querySelector("#content");
        header.innerHTML = Profiles.format(data, handler);
      };
      V.renderNavBar = function (
        hAbout,
        handlerListe,
        handlerSelect,
        data,
        handlerLogOut,
        handlerDropdown,
        handlerSearch,
      ) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(
          hAbout,
          handlerListe,
          handlerSelect,
          data,
          handlerLogOut,
          handlerDropdown,
          handlerSearch,
        );
      };

      V.renderMovies = function (data, handler, error) {
        let content = document.querySelector("#content");
        content.innerHTML = Movies.format(data, handler, error);
      };

      V.renderMovieDetail = function (data, handlerFavorite) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data, handlerFavorite);
      };

      V.renderMoviesCategory = function (groupedData, handler) {
        let content = document.querySelector("#content");
        let html = "";

        if (groupedData) {
          for (let category in groupedData) {
            let moviesInCat = groupedData[category];
            let moviesHtml = Movies.format(moviesInCat, handler);
            html += MovieCategory.format(category, moviesHtml);
          }
        }
        if (html == "") {
          content.innerHTML += `
                <div class="empty-state">
                    <p>Aucun film disponible pour votre tranche d'âge.</p>
                </div>`;
        } else {
          content.innerHTML += html;
        }
      };
      V.renderMoviesFavorite = function (handler, favoriteData) {
        let content = document.querySelector("#content");
        let html = "";
        if (favoriteData && favoriteData.length > 0) {
          let favCards = Movies.format(favoriteData, handler);
          html += MovieFavorite.format(favCards);
        }
        if (html == "") {
          let data = `
                <div class="empty-state">
                    <p>Votre liste de favoris est vide.</p>
                </div>`;
          html += MovieFavorite.format(data);
        }
        content.innerHTML += html;
      };

      V.renderMoviesHighlighted = function (handler, highlightedData) {
        let content = document.querySelector("#content");
        let html = "";
        if (highlightedData && highlightedData.length > 0) {
          let HighlightCards = Movies.format(highlightedData, handler);
          html += MoviesHighlighted.format(HighlightCards);
        }
        if (html == "") {
          let data = `
                <div class="empty-state">
                    <p>Aucun film mis en avant pour le moment.</p>
                </div>`;
          html += MoviesHighlighted.format(data);
        }
        content.innerHTML += html;
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
