<div class="detail">
    <span class="detail__close" onclick="{{handlerclose}}">&#120</span>
    <h1 class="detail__title">{{title}}</h1>
    <div class="detail__top">
        <img class="detail__img" src="{{cover}}" alt="{{title}}">
        <ul class="detail__infos">
            <li class="detail__info">
                <h2>Description</h2>
                <p>{{description}}</p>
            </li>
            <li class="detail__info">
                <h2>Réalisateur</h2>
                <p>{{realisateur}}</p>
            </li>
            <li class="detail__info">
                <h2>Année de sortie</h2>
                <p>{{year}}</p>
            </li>
            <li class="detail__info">
                <h2>Catégorie</h2>
                <p>{{categorie}}</p>
            </li>
            <li class="detail__info">
                <h2>Âge minimum</h2>
                <p>{{age}}</p>
            </li>
            <li class="detail__info">
                <h2>Note des utilisateurs : </h2>
                <p>{{note}}</p>
            </li>
            <li class="detail__info">
                <svg class="detail__favorite" onclick="{{handlerFavorite}}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 14C20.49 12.54 22 10.79 22 8.5C22 7.04131 21.4205 5.64236 20.3891 4.61091C19.3576 3.57946 17.9587 3 16.5 3C14.74 3 13.5 3.5 12 5C10.5 3.5 9.26 3 7.5 3C6.04131 3 4.64236 3.57946 3.61091 4.61091C2.57946 5.64236 2 7.04131 2 8.5C2 10.8 3.5 12.55 5 14L12 21L19 14Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </li>
            <li class="detail__info">
                <label for="note">Donner une note :</label>
                <div class="detail__note">
                    <input class="detail__inputNote" id="note" type="number" min="1" max="5" step="0.1" placeholder="x.x">
                    <span class="detail__inputNote-info">/5</span>
                    <input class="detail__btn-valider" type="button" value="valider" onclick="{{handlerNote}}">
                </div>
            </li>
        </ul>
        <div class="detaile__comments">
            <h1>Commentaire</h1>
            <ul class="detaile__commentsList">
                {{comment}}
            </ul>
            <div>
                <textarea class="detail__inputComment" name="" id="" placeholder="Donnez votre avis" required></textarea>
                <input class="detail__btn-valider" type="button" value="Envoyer" onclick="{{handlerComment}}">
            </div>
        </div>
    </div>
    <iframe class="detail__trailer" src="{{trailer}}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>
