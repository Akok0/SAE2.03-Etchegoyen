<div class="form">
    <form class="form__profile">
        <h1>Gérer un profil utilisateur</h1>
        
        <select name="id" class="profiles" onchange="{{handlerSelect}}">
            <option value="">--CRÉER UN NOUVEAU PROFIL--</option>
            {{profiles}}
        </select>
        
        <input type="text" name="name" placeholder="Nom du profil" required>
        <input type="text" name="avatar" placeholder="URL avatar (optionnel)">
        <select name="age">
            <option value="0">Tout public</option>
            <option value="10">10 ans</option>
            <option value="12">12 ans</option>
            <option value="16">16 ans</option>
            <option value="18">18 ans</option>
        </select>
        <input class="addprofile__btn" type="button" onclick="{{handlerUpdate}}" value="addprofile" name="todo">
    </form>
</div>
