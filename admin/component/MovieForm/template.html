<div class="form">
  <h1>Ajouter un film</h1>

  <form class="form__addmovie">
    <input class="addmovie__input" type="text" name="titre" placeholder="Titre du film" required/>
    <input class="addmovie__input" type="text" name="realisateur" placeholder="Réalisateur du film" required />
    <input class="addmovie__input" type="number" name="annee" value="2026" max="2026" required />
    <input class="addmovie__input" type="number" name="duree" placeholder="temps"required />
    <textarea class="addmovie__input"
      name="description"
      placeholder="Description ou synopsis" required 
    ></textarea>

    <select name="categorie" required >
      <option value="1">Action</option>
      <option value="2">Comédie</option>
      <option value="3">Drame</option>
      <option value="4">Science-Fiction</option>
      <option value="5">Animation</option>
      <option value="6">Thriller</option>
      <option value="7">Horreur</option>
      <option value="8">Aventure</option>
      <option value="9">Fantaisie</option>
      <option value="10">Documentaire</option>
    </select>

    <input class="addmovie__input" type="text" name="cover" placeholder="Image du film" required />
    <input class="addmovie__input" type="text" name="trailer" placeholder="URL du trailer" required />

    <select name="age_min" required >
      <option value="0">Tout public</option>
      <option value="10">Interdit aux moins de 10 ans</option>
      <option value="12">Interdit aux moins de 12 ans</option>
      <option value="16">Interdit aux moins de 16 ans</option>
      <option value="18">Interdit aux moins de 18 ans</option>

    </select>

    <input class="addmovie__btn" type="button" onclick="{{handler}}" value="addmovies" name="todo">
  </form>
</div>
