<div class="addmovie">
  <h1>Ajouter un film</h1>

  <form class="form__addmovie">
    <input class="addmovie__input" type="text" name="titre" placeholder="Titre du film" required/>
    <input class="addmovie__input" type="text" name="realisateur" placeholder="Réalisateur du film" required pattern="[^0-9]*" title="Numbers are not allowed"/>
    <input class="addmovie__input" type="number" name="annee" value="2026" min="1895" max="2026" required />
    <input class="addmovie__input" type="number" name="duree" placeholder="temps" min="1" required/>
    <textarea class="addmovie__input" name="description" placeholder="Description ou synopsis" required></textarea>

    <select name="categorie">
      {{option}}
    </select>

    <input class="addmovie__input" type="text" name="cover" placeholder="Image du film" required/>
    <input class="addmovie__input" type="text" name="trailer" placeholder="URL du trailer" required/>

    <select name="age_min">
      <option value="0">Tout public</option>
      <option value="10">Interdit aux moins de 10 ans</option>
      <option value="12">Interdit aux moins de 12 ans</option>
      <option value="16">Interdit aux moins de 16 ans</option>
      <option value="18">Interdit aux moins de 18 ans</option>

    </select>

    <input class="addmovie__btn" type="button" onclick="{{handler}}" value="addmovies" name="todo">
  </form>
</div>
